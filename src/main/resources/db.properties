# MySQL 8.0+ 驱动类名
driver=com.mysql.cj.jdbc.Driver

# 连接地址：
# localhost:3306                    -> 本地数据库
# myweb                             -> 你的实际数据库名
# useSSL=false                      -> 本地开发关闭SSL，提高性能
# serverTimezone=Asia/Shanghai      -> 指定东八区（北京时间）
# characterEncoding=utf8            -> 确保中文不乱码
url=jdbc:mysql://localhost:3306/myweb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8

# 数据库用户名
username=MYSQL_USERNAME

# 数据库密码
password=MYSQL_PASSWORD